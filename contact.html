    <style>
        :root { --bg-primary: #0a0a0a; --bg-secondary: #141414; --bg-card: #1a1a1a; --text-primary: #ffffff; --text-secondary: #888888; --accent: #00d4aa; --accent-dim: rgba(0, 212, 170, 0.12); --border: #2a2a2a; --nav-bg: rgba(10, 10, 10, 0.8); --shadow: 0 2px 8px rgba(0, 0, 0, 0.3); --shadow-hover: 0 8px 24px rgba(0, 0, 0, 0.4); }
        [data-theme="light"] { --bg-primary: #ffffff; --bg-secondary: #f9f9f9; --bg-card: #ffffff; --text-primary: #1a1a1a; --text-secondary: #555555; --accent: #00d4aa; --accent-dim: rgba(0, 212, 170, 0.15); --border: #e8e8e8; --nav-bg: rgba(255, 255, 255, 0.95); --shadow: 0 2px 8px rgba(0, 0, 0, 0.08); --shadow-hover: 0 8px 24px rgba(0, 0, 0, 0.12); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg-primary); color: var(--text-primary); line-height: 1.6; min-height: 100vh; display: flex; flex-direction: column; }
        ::selection { background: var(--accent); color: var(--bg-primary); }

        .contact-page { flex: 1; display: flex; align-items: center; justify-content: center; padding: 7rem 4rem 4rem; position: relative; overflow: hidden; }
        .contact-page::before { content: ''; position: absolute; top: -20%; right: -10%; width: 60%; height: 100%; background: radial-gradient(ellipse at center, var(--accent-dim) 0%, transparent 70%); pointer-events: none; }
        .contact-container { max-width: 600px; text-align: center; position: relative; z-index: 1; }
        .contact-container h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(3rem, 8vw, 5rem); line-height: 1; margin-bottom: 1.5rem; }
        .contact-container p { font-size: 1.125rem; color: var(--text-secondary); margin-bottom: 3rem; line-height: 1.6; }

        .contact-links { display: flex; flex-direction: column; gap: 1rem; align-items: center; }
        .contact-link { display: inline-flex; align-items: center; gap: 0.75rem; padding: 1.25rem 2.5rem; border: 1px solid var(--border); color: var(--text-primary); text-decoration: none; font-weight: 500; font-size: 1.125rem; transition: all 0.3s ease; background: var(--bg-card); min-width: 320px; justify-content: center; box-shadow: var(--shadow); }
        .contact-link:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-3px); box-shadow: var(--shadow-hover); }
        .contact-link svg { width: 20px; height: 20px; }

        .contact-note { margin-top: 3rem; font-size: 0.875rem; color: var(--text-secondary); }

        footer { padding: 1.5rem 4rem; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; align-items: center; gap: 2rem; }
        .footer-text { font-size: 0.8rem; color: var(--text-secondary); }

        @media (max-width: 768px) {
            nav, .contact-page, footer { padding-left: 2rem; padding-right: 2rem;
        }
            .contact-link { min-width: 100%; }
        }
    </style>

    <script>
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateToggleIcons(newTheme);
        }
        function updateToggleIcons(theme) {
            const sunIcon = document.querySelector('.sun-icon');
            const moonIcon = document.querySelector('.moon-icon');
            if (theme === 'light') {
                sunIcon.style.display = 'none';
                moonIcon.style.display = 'block';
            } else {
                sunIcon.style.display = 'block';
                moonIcon.style.display = 'none';
            }
        }
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            if (savedTheme === 'light') {
                document.documentElement.setAttribute('data-theme', 'light');
            }
            document.addEventListener('DOMContentLoaded', function() {
                updateToggleIcons(localStorage.getItem('theme') || 'dark');
            });
        })();
    </script>
    <script src="nav.js"></script>
</body>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — Daan Lindhout</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root { --bg-primary: #0a0a0a; --bg-secondary: #141414; --bg-card: #1a1a1a; --text-primary: #ffffff; --text-secondary: #888888; --accent: #00d4aa; --accent-dim: rgba(0, 212, 170, 0.12); --border: #2a2a2a; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg-primary); color: var(--text-primary); line-height: 1.6; min-height: 100vh; display: flex; flex-direction: column; }
        ::selection { background: var(--accent); color: var(--bg-primary); }

        nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: 1.5rem 4rem; display: flex; justify-content: flex-end; align-items: center; background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
        .logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; letter-spacing: 0.1em; text-decoration: none; color: var(--text-primary); }
        .logo span { color: var(--accent); }
        .nav-links { display: flex; gap: 2.5rem; }
        .nav-links a { color: var(--text-secondary); text-decoration: none; font-size: 0.875rem; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; transition: color 0.3s ease; }
        .nav-links a:hover, .nav-links a.active { color: var(--accent); }

        .contact-page { flex: 1; display: flex; align-items: center; justify-content: center; padding: 7rem 4rem 4rem; position: relative; overflow: hidden; }
        .contact-page::before { content: ''; position: absolute; top: -20%; right: -10%; width: 60%; height: 100%; background: radial-gradient(ellipse at center, var(--accent-dim) 0%, transparent 70%); pointer-events: none; }
        .contact-container { max-width: 600px; text-align: center; position: relative; z-index: 1; }
        .contact-container h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(3rem, 8vw, 5rem); line-height: 1; margin-bottom: 1.5rem; }
        .contact-container p { font-size: 1.125rem; color: var(--text-secondary); margin-bottom: 3rem; line-height: 1.6; }

        .contact-links { display: flex; flex-direction: column; gap: 1rem; align-items: center; }
        .contact-link { display: inline-flex; align-items: center; gap: 0.75rem; padding: 1.25rem 2.5rem; border: 1px solid var(--border); color: var(--text-primary); text-decoration: none; font-weight: 500; font-size: 1.125rem; transition: all 0.3s ease; background: var(--bg-card); min-width: 320px; justify-content: center; }
        .contact-link:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-3px); }
        .contact-link svg { width: 20px; height: 20px; }

        .contact-note { margin-top: 3rem; font-size: 0.875rem; color: var(--text-secondary); }

        footer { padding: 1.5rem 4rem; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; align-items: center; gap: 2rem; }
        .footer-text { font-size: 0.8rem; color: var(--text-secondary); }

        @media (max-width: 768px) {
            nav, .contact-page, footer { padding-left: 2rem; padding-right: 2rem; }
            .nav-links { display: none; }
            .contact-link { min-width: 100%; }
        }
    </style>
</head>
<body>
    <nav>
        
        <div class="nav-links">
            <a href="index.html">About</a>
            <a href="portfolio.html">Portfolio</a>
            <a href="tenets.html">Tenets</a>
            <a href="contact.html" class="active">Contact</a>
        </div>
    </nav>

    <section class="contact-page">
        <div class="contact-container">
            <h1>LET'S CONNECT</h1>
            <p>Interested in talking about UX? Please reach out.</p>
            
            <div class="contact-links">
                <a href="mailto:email@daanlindhout.com" class="contact-link">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                    </svg>
                    email@daanlindhout.com
                </a>
                <a href="https://linkedin.com/in/daanlindhout" class="contact-link" target="_blank">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
                    </svg>
                    LinkedIn Profile
                </a>
            </div>

            <p class="contact-note">Based in Seattle, WA</p>
        </div>
    </section>

    <footer>
        <p class="footer-text">© 2025 Daan Lindhout</p>
        <p class="footer-text">Seattle, WA</p>
    </footer>
</body>
</html>
